<!DOCTYPE html>
<html lang="zh-CN">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Stirrup Agent Visualizer</title>
  <script src="https://cdn.tailwindcss.com"></script>
  <style>
    body { background: #0f1117; color: #e2e8f0; font-family: system-ui, sans-serif; }
    .card { background: #1a1d27; border: 1px solid #2a2d3a; }
    .tool-args { background: #13111e; border-left: 3px solid #a78bfa; }
    .json-key { color: #93c5fd; }
    .json-str { color: #86efac; }
    .json-num { color: #fbbf24; }
    .json-bool { color: #f472b6; }
    pre { white-space: pre-wrap; word-break: break-word; }
    .pulse { animation: pulse 2s cubic-bezier(0.4,0,0.6,1) infinite; }
    @keyframes pulse { 0%,100%{opacity:1} 50%{opacity:.4} }
    ::-webkit-scrollbar { width: 6px; }
    ::-webkit-scrollbar-track { background: #0f1117; }
    ::-webkit-scrollbar-thumb { background: #2a2d3a; border-radius: 3px; }
    .task-card { cursor: pointer; transition: background 0.15s, border-color 0.15s; }
    .task-card:hover { background: #22253a; }
    .task-card.selected { background: #1e2240; border-color: #6366f1; }
    .tool-entry { cursor: pointer; transition: background 0.1s; }
    .tool-entry:hover { background: #22253a; }
    .tool-detail { display: none; }
    .tool-entry.expanded .tool-detail { display: block; }
    .event-enter { animation: eventIn 0.2s ease-out; }
    @keyframes eventIn { from{opacity:0;transform:translateY(4px)} to{opacity:1;transform:translateY(0)} }
  </style>
</head>
<body class="min-h-screen">
<div class="flex h-screen overflow-hidden">

  <!-- ── Left: Task List (220px) ── -->
  <div class="w-56 flex-shrink-0 card border-r border-gray-800 flex flex-col">

    <div class="p-3 border-b border-gray-800">
      <h1 class="text-sm font-bold text-white flex items-center gap-2">
        <span class="text-purple-400">⚡</span> Stirrup
      </h1>
      <div class="mt-1 flex items-center gap-1.5 text-xs text-gray-500">
        <span id="dot" class="inline-block w-2 h-2 rounded-full bg-gray-600"></span>
        <span id="status-text">等待连接...</span>
      </div>
      <div class="mt-2 text-xs text-gray-500" id="task-summary">0 任务</div>
    </div>

    <div id="task-list" class="flex-1 overflow-y-auto p-2 space-y-1.5">
      <div class="text-xs text-gray-600 italic p-2">暂无任务</div>
    </div>

    <div class="p-2 border-t border-gray-800">
      <button onclick="resetAll()"
        class="w-full text-xs bg-gray-800 hover:bg-gray-700 text-gray-400 rounded py-1.5 transition-colors">
        清空历史
      </button>
    </div>
  </div>

  <!-- ── Middle: Event Feed (flex-1) ── -->
  <div class="flex-1 flex flex-col overflow-hidden min-w-0">

    <div class="px-4 py-2.5 border-b border-gray-800 flex items-center justify-between bg-gray-900/40 flex-shrink-0">
      <div class="min-w-0">
        <div class="font-semibold text-white text-sm truncate" id="agent-name">Agent</div>
        <div class="text-xs text-gray-500" id="agent-model">—</div>
      </div>
      <div id="running" class="hidden items-center gap-2 text-xs text-green-400 flex-shrink-0 ml-3">
        <span class="pulse inline-block w-2 h-2 rounded-full bg-green-400"></span>
        运行中
      </div>
    </div>

    <div id="feed" class="flex-1 overflow-y-auto p-4 space-y-2.5">
      <div class="text-center text-gray-600 py-20" id="empty-hint">
        <div class="text-4xl mb-3">🤖</div>
        <div class="text-sm">等待 Agent 启动...</div>
        <div class="text-xs mt-1">事件将实时显示在这里</div>
      </div>
    </div>
  </div>

  <!-- ── Right: Tool Timeline (280px) ── -->
  <div class="w-72 flex-shrink-0 card border-l border-gray-800 flex flex-col">

    <div class="p-3 border-b border-gray-800">
      <h3 class="text-xs font-bold text-gray-300 uppercase tracking-wider">工具调用时间线</h3>
      <div id="tool-summary" class="mt-1.5 text-xs text-gray-500">暂无调用</div>
    </div>

    <div id="tool-timeline" class="flex-1 overflow-y-auto p-2 space-y-1">
      <div class="text-xs text-gray-600 italic p-2">暂无工具调用</div>
    </div>
  </div>

</div>

<script>
// ── Global state ──
const allEvents = [];                  // all received events (including replayed)
const tasks = {};                      // task_id → { id, name, model, status, startTime, endTime, occupation }
let selectedTaskId = null;

// ── Utilities ──

function esc(s) {
  return String(s).replace(/&/g,'&amp;').replace(/</g,'&lt;').replace(/>/g,'&gt;');
}

function fmtJSON(v, depth) {
  depth = depth || 0;
  const ind = '  '.repeat(depth + 1);
  const ind0 = '  '.repeat(depth);
  if (v === null) return '<span class="json-bool">null</span>';
  if (typeof v === 'boolean') return '<span class="json-bool">' + v + '</span>';
  if (typeof v === 'number') return '<span class="json-num">' + v + '</span>';
  if (typeof v === 'string') return '<span class="json-str">"' + esc(v) + '"</span>';
  if (Array.isArray(v)) {
    if (!v.length) return '[]';
    return "[\n" + v.map(x => ind + fmtJSON(x, depth + 1)).join(",\n") + "\n" + ind0 + "]";
  }
  if (typeof v === 'object') {
    const keys = Object.keys(v);
    if (!keys.length) return '{}';
    return "{\n" + keys.map(k =>
      ind + '<span class="json-key">"' + esc(k) + '"</span>: ' + fmtJSON(v[k], depth + 1)
    ).join(",\n") + "\n" + ind0 + "}";
  }
  return esc(String(v));
}

function fmtDur(s) {
  if (s == null) return '';
  return s >= 60 ? (s / 60).toFixed(1) + 'm' : s + 's';
}

// ── Task management ──

function ensureTask(taskId, ev) {
  if (!tasks[taskId]) {
    tasks[taskId] = {
      id: taskId,
      name: ev.name || 'agent',
      model: ev.model || '—',
      status: 'running',
      startTime: Date.now(),
      endTime: null,
      occupation: null,
    };
  }
  return tasks[taskId];
}

function selectTask(taskId) {
  selectedTaskId = taskId;
  document.querySelectorAll('.task-card').forEach(el => {
    el.classList.toggle('selected', el.dataset.taskId == taskId);
  });
  rebuildFeed();
  rebuildTimeline();
  updateHeader();
}

function updateHeader() {
  const t = tasks[selectedTaskId];
  if (!t) return;
  document.getElementById('agent-name').textContent = t.occupation || t.name || 'Agent';
  document.getElementById('agent-model').textContent = t.model || '—';
  const running = t.status === 'running';
  document.getElementById('running').classList.toggle('hidden', !running);
  document.getElementById('running').classList.toggle('flex', running);
}

// ── Task list rendering ──

function renderTaskList() {
  const list = document.getElementById('task-list');
  const ids = Object.keys(tasks).map(Number).sort((a, b) => a - b);
  if (!ids.length) {
    list.innerHTML = '<div class="text-xs text-gray-600 italic p-2">暂无任务</div>';
    document.getElementById('task-summary').textContent = '0 任务';
    return;
  }
  const done = ids.filter(id => tasks[id].status !== 'running').length;
  document.getElementById('task-summary').textContent = done + '/' + ids.length + ' 完成';
  list.innerHTML = ids.map(id => {
    const t = tasks[id];
    const statusIcon = t.status === 'running' ? '🔄' : t.status === 'success' ? '✓' : '✗';
    const statusColor = t.status === 'running' ? 'text-yellow-400' : t.status === 'success' ? 'text-green-400' : 'text-red-400';
    const dur = t.endTime ? fmtDur(Math.round((t.endTime - t.startTime) / 1000)) : '';
    const label = t.occupation
      ? (t.occupation.length > 24 ? t.occupation.slice(0, 24) + '…' : t.occupation)
      : t.name;
    return '<div class="task-card card rounded-lg p-2.5 text-xs border' +
      (id == selectedTaskId ? ' selected' : '') + '" data-task-id="' + id +
      '" onclick="selectTask(' + id + ')">' +
      '<div class="flex items-center justify-between mb-1">' +
        '<span class="text-gray-500 font-mono">#' + id + '</span>' +
        '<span class="' + statusColor + '">' + statusIcon + (dur ? ' ' + dur : '') + '</span>' +
      '</div>' +
      '<div class="text-gray-200 truncate leading-tight">' + esc(label) + '</div>' +
    '</div>';
  }).join('');
}

// ── Feed rendering ──

function appendToFeed(html, animate) {
  const hint = document.getElementById('empty-hint');
  if (hint) hint.remove();
  const div = document.createElement('div');
  if (animate) div.className = 'event-enter';
  div.innerHTML = html;
  const feed = document.getElementById('feed');
  feed.appendChild(div);
  feed.scrollTop = feed.scrollHeight;
}

function rebuildFeed() {
  const feed = document.getElementById('feed');
  feed.innerHTML = '';
  if (!selectedTaskId && selectedTaskId !== 0) {
    feed.innerHTML = '<div class="text-center text-gray-600 py-20" id="empty-hint">' +
      '<div class="text-4xl mb-3">🤖</div><div class="text-sm">请从左侧选择一个任务</div></div>';
    return;
  }
  const evs = allEvents.filter(ev => ev.task_id == selectedTaskId);
  if (!evs.length) {
    feed.innerHTML = '<div class="text-center text-gray-600 py-20" id="empty-hint">' +
      '<div class="text-4xl mb-3">🤖</div><div class="text-sm">此任务暂无事件</div></div>';
    return;
  }
  evs.forEach(ev => {
    const html = renderEvent(ev);
    if (html) appendToFeed(html, false);
  });
}

function renderEvent(ev) {
  if (ev.type === 'session_start') {
    const depthTag = ev.depth > 0 ? ' <span class="text-gray-500">depth ' + ev.depth + '</span>' : '';
    return '<div class="card rounded-xl p-3 border-l-4 border-cyan-500">' +
      '<div class="text-xs font-semibold text-cyan-400 mb-1">▶ SESSION START' + depthTag + '</div>' +
      '<div class="text-sm text-gray-300"><span class="font-mono text-white">' + esc(ev.name) + '</span>' +
        ' · ' + esc(ev.model || 'unknown') + ' · max_turns: ' + (ev.max_turns ?? '∞') + '</div>' +
    '</div>';
  }

  if (ev.type === 'session_end') {
    const ok = ev.success;
    return '<div class="card rounded-xl p-3 border-l-4 ' + (ok ? 'border-green-500' : 'border-red-500') + '">' +
      '<div class="text-xs font-semibold ' + (ok ? 'text-green-400' : 'text-red-400') + ' mb-1">' +
        (ok ? '✓' : '✗') + ' SESSION END · ' + esc(ev.name) + '</div>' +
      (ev.error ? '<div class="text-xs text-red-300 font-mono mt-1">' + esc(ev.error) + '</div>' : '') +
    '</div>';
  }

  if (ev.type === 'step') return null;  // stats-only

  if (ev.type === 'task') {
    const preview = ev.content.length > 400 ? ev.content.slice(0, 400) + '…' : ev.content;
    return '<div class="card rounded-xl p-4 border-l-4 border-blue-500">' +
      '<div class="text-xs font-semibold text-blue-400 mb-2">📋 TASK · ' + esc(ev.agent) + '</div>' +
      '<pre class="text-sm text-gray-200 leading-relaxed">' + esc(preview) + '</pre>' +
    '</div>';
  }

  if (ev.type === 'assistant') {
    const ml = ev.depth > 0 ? 'style="margin-left:' + Math.min(ev.depth * 20, 80) + 'px"' : '';
    const contentHtml = ev.content
      ? '<pre class="text-sm text-gray-200 leading-relaxed mb-3">' +
          esc(ev.content.slice(0, 3000)) + (ev.content.length > 3000 ? ' …(truncated)' : '') +
        '</pre>'
      : '';
    const toolsHtml = ev.tool_calls.map(tc =>
      '<div class="tool-args rounded-lg p-3 mb-2">' +
        '<div class="text-xs font-semibold text-purple-300 mb-1.5">🔧 ' + esc(tc.name) + '</div>' +
        '<pre class="text-xs text-gray-300 font-mono">' + fmtJSON(tc.arguments) + '</pre>' +
      '</div>'
    ).join('');
    const tokHtml = (ev.input_tokens || ev.output_tokens)
      ? '<div class="text-xs text-gray-600 mt-2">↑ ' + (ev.input_tokens || 0).toLocaleString() +
        ' · ↓ ' + (ev.output_tokens || 0).toLocaleString() + ' tokens</div>'
      : '';
    return '<div class="card rounded-xl p-4 border-l-4 border-yellow-500" ' + ml + '>' +
      '<div class="text-xs font-semibold text-yellow-400 mb-2">💬 ASSISTANT · ' + esc(ev.agent) +
        ' · Turn ' + ev.turn + '/' + ev.max_turns + '</div>' +
      contentHtml + toolsHtml + tokHtml +
    '</div>';
  }

  if (ev.type === 'tool_result') {
    const ok = ev.success && ev.args_was_valid;
    const ml = ev.depth > 0 ? 'style="margin-left:' + Math.min(ev.depth * 20, 80) + 'px"' : '';
    const dur = ev.duration != null ? ' · ' + fmtDur(ev.duration) : '';
    const preview = ev.content.length > 2000 ? ev.content.slice(0, 2000) + '\n…(truncated)' : ev.content;
    return '<div class="card rounded-xl p-4 border-l-4 ' + (ok ? 'border-green-500' : 'border-red-500') + '" ' + ml + '>' +
      '<div class="text-xs font-semibold ' + (ok ? 'text-green-400' : 'text-red-400') + ' mb-2">' +
        (ok ? '✓' : '✗') + ' TOOL RESULT · <span class="font-mono">' + esc(ev.name) + '</span>' + esc(dur) + '</div>' +
      '<pre class="text-xs text-gray-300 font-mono bg-black/30 rounded-lg p-3 max-h-52 overflow-y-auto">' +
        esc(preview) +
      '</pre>' +
    '</div>';
  }

  if (ev.type === 'context_summary_start') {
    return '<div class="card rounded-xl p-3 border-l-4 border-orange-500">' +
      '<div class="text-xs font-semibold text-orange-400">📝 CONTEXT SUMMARIZATION</div>' +
      '<div class="text-xs text-gray-500 mt-1">已用 ' + (ev.pct_used * 100).toFixed(1) +
        '%，阈值 ' + (ev.cutoff * 100).toFixed(1) + '%</div>' +
    '</div>';
  }

  if (ev.type === 'context_summary_complete') {
    return '<div class="card rounded-xl p-3 border-l-4 border-green-500">' +
      '<div class="text-xs font-semibold text-green-400 mb-1">✓ SUMMARY GENERATED</div>' +
      '<pre class="text-xs text-gray-400">' + esc(ev.summary) + '</pre>' +
    '</div>';
  }

  if (ev.type === 'log') {
    const col = ev.level === 'error' ? 'red' : 'orange';
    return '<div class="card rounded-xl p-2.5 border-l-4 border-' + col + '-500">' +
      '<div class="text-xs font-mono text-' + col + '-400">[' + ev.level.toUpperCase() + '] ' + esc(ev.message) + '</div>' +
    '</div>';
  }

  return null;
}

// ── Tool timeline rendering ──

function rebuildTimeline() {
  const tl = document.getElementById('tool-timeline');
  const summary = document.getElementById('tool-summary');

  if (!selectedTaskId && selectedTaskId !== 0) {
    tl.innerHTML = '<div class="text-xs text-gray-600 italic p-2">暂无工具调用</div>';
    summary.textContent = '暂无调用';
    return;
  }

  const toolEvs = allEvents.filter(ev => ev.task_id == selectedTaskId && ev.type === 'tool_result');
  if (!toolEvs.length) {
    tl.innerHTML = '<div class="text-xs text-gray-600 italic p-2">暂无工具调用</div>';
    summary.textContent = '暂无调用';
    return;
  }

  const total = toolEvs.length;
  const errors = toolEvs.filter(ev => !ev.success || !ev.args_was_valid).length;
  summary.textContent = total + ' 次调用 · ' + (total - errors) + ' 成功 · ' + errors + ' 失败';

  tl.innerHTML = toolEvs.map((ev, i) => {
    const ok = ev.success && ev.args_was_valid;
    const dur = ev.duration != null ? fmtDur(ev.duration) : '—';
    const preview = ev.content.length > 400 ? ev.content.slice(0, 400) + '…' : ev.content;
    return '<div class="tool-entry card rounded-lg p-2 text-xs border-l-2 ' +
      (ok ? 'border-green-600' : 'border-red-600') +
      '" onclick="this.classList.toggle(\'expanded\')">' +
      '<div class="flex items-center gap-2">' +
        '<span class="' + (ok ? 'text-green-400' : 'text-red-400') + ' font-bold flex-shrink-0">' + (ok ? '✓' : '✗') + '</span>' +
        '<span class="text-purple-300 font-mono truncate flex-1">' + esc(ev.name) + '</span>' +
        '<span class="text-gray-500 flex-shrink-0">' + esc(dur) + '</span>' +
      '</div>' +
      '<div class="tool-detail mt-2 pt-2 border-t border-gray-700">' +
        '<pre class="text-xs text-gray-400 font-mono max-h-48 overflow-y-auto bg-black/20 rounded p-1.5">' +
          esc(preview) +
        '</pre>' +
      '</div>' +
    '</div>';
  }).join('');
}

// ── SSE event processing ──

function processEvent(ev, isReplay) {
  allEvents.push(ev);

  // Update task metadata
  if (ev.type === 'session_start' && ev.depth === 0) {
    ensureTask(ev.task_id, ev);
    if (!isReplay) {
      // Auto-select new live task
      selectedTaskId = ev.task_id;
    } else if (selectedTaskId === null) {
      selectedTaskId = ev.task_id;
    }
  }

  if (ev.type === 'session_end' && ev.depth === 0) {
    const t = tasks[ev.task_id];
    if (t) {
      t.status = ev.success ? 'success' : 'error';
      t.endTime = Date.now();
    }
  }

  if (ev.type === 'task' && ev.depth === 0) {
    const t = tasks[ev.task_id];
    if (t) t.occupation = ev.content.length > 60 ? ev.content.slice(0, 60) + '…' : ev.content;
  }

  if (!isReplay) {
    renderTaskList();
    if (ev.task_id == selectedTaskId) {
      const html = renderEvent(ev);
      if (html) appendToFeed(html, true);
      if (ev.type === 'tool_result') rebuildTimeline();
      updateHeader();
    }
  }
}

function finalizeReplay() {
  renderTaskList();
  if (selectedTaskId !== null) {
    rebuildFeed();
    rebuildTimeline();
    updateHeader();
  }
}

// ── SSE connection ──

let isReplaying = true;
const es = new EventSource('/events');

es.onopen = () => {
  document.getElementById('dot').className = 'inline-block w-2 h-2 rounded-full bg-green-500';
  document.getElementById('status-text').textContent = '已连接';
  isReplaying = true;
};

es.onerror = () => {
  document.getElementById('dot').className = 'inline-block w-2 h-2 rounded-full bg-red-500';
  document.getElementById('status-text').textContent = '连接断开';
};

es.onmessage = e => {
  const ev = JSON.parse(e.data);
  if (ev.type === '__replay_end__') {
    isReplaying = false;
    finalizeReplay();
    return;
  }
  processEvent(ev, isReplaying);
};

// ── Reset ──

function resetAll() {
  fetch('/reset').then(() => {
    allEvents.length = 0;
    Object.keys(tasks).forEach(k => delete tasks[k]);
    selectedTaskId = null;
    isReplaying = false;
    renderTaskList();
    document.getElementById('feed').innerHTML =
      '<div class="text-center text-gray-600 py-20" id="empty-hint">' +
      '<div class="text-4xl mb-3">🤖</div>' +
      '<div class="text-sm">等待 Agent 启动...</div>' +
      '<div class="text-xs mt-1">事件将实时显示在这里</div></div>';
    document.getElementById('tool-timeline').innerHTML =
      '<div class="text-xs text-gray-600 italic p-2">暂无工具调用</div>';
    document.getElementById('tool-summary').textContent = '暂无调用';
    document.getElementById('agent-name').textContent = 'Agent';
    document.getElementById('agent-model').textContent = '—';
    document.getElementById('running').classList.add('hidden');
    document.getElementById('running').classList.remove('flex');
  });
}
</script>
</body>
</html>
